name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript engine + server ───────────────────────────────────────────────
  engine:
    name: Engine tests (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build engine
        run: npm run build --workspace=packages/engine

      - name: Run engine tests
        run: npm test --workspace=packages/engine

      - name: Build server
        run: npm run build --workspace=packages/server

  # ── Python API gateway ───────────────────────────────────────────────────────
  python-api:
    name: API gateway tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio respx

      - name: Run API tests
        run: pytest tests.py -v --tb=short

  # ── Vue frontend ─────────────────────────────────────────────────────────────
  web:
    name: Frontend build (Vue 3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build engine (dependency)
        run: npm run build --workspace=packages/engine

      - name: Build web
        run: npm run build --workspace=packages/web

  # ── Docker build smoke test ──────────────────────────────────────────────────
  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [engine, python-api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose -f docker-compose.yml build

      - name: Smoke test — engine health
        run: |
          docker compose -f docker-compose.yml up -d engine
          sleep 5
          curl -f http://localhost:3000/health
          docker compose -f docker-compose.yml down